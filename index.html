    <style>
        /* Set up a fullscreen layout with no margins or scrollbars */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Main container styling */
        #main {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Date and time display styling */
        #dateTimeDisplay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            color: lightgray;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-family: Arial, sans-serif;
            opacity: 1;
            visibility: visible;
        }

        /* Light list container, hidden initially */
        #lightList {
            position: absolute;
            top: 50px;
            right: 10px;
            width: 200px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: none;
            z-index: 5;
        }

        /* Control buttons styling */
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        /* Individual button styling */
        #controls button {
            padding: 10px;
            background-color: #85858570;
            color: #788b97;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Button hover styling */
        #controls button:hover {
            background-color: #4f473a;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* Log panel styling, located at the bottom */
        #log-panel {
            width: 100%;
            height: 200px;
            overflow-y: scroll;
            background-color: black;
            color: gray;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: monospace;
            position: absolute;
            bottom: 0;
            z-index: 10;
            user-select: text !important;
        }

        /* Light state and selector styling */
        #lightState, #lightSelector {
            position: absolute;
            bottom: 320px;
            left: 10px;
            width: 300px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 5;
        }

        /* Command Queue styling */

            background-color: rgba(0, 0, 0, 0.5);

            border-radius: 5px;
            font-family: Arial, sans-serif;
            z-index: 10;
        }

    <!-- Command Queue Functionality -->
    <script>
        // Ensure that CommandScheduler is loaded
        if (window.CommandScheduler && typeof window.CommandScheduler.clearCommandQueue === 'function') {
            // Clear the command queue
            function clearCommandQueue() {
                console.log("Clearing command queue...");
                window.CommandScheduler.clearCommandQueue(); // Use the CommandScheduler's method
                updateCommandQueue(null, 0); // Clear the UI
            }

            // Function to update the command queue display
            function updateCommandQueue(nextCommand, timeUntilExecution) {
                console.log("Updating Command Queue: ", nextCommand, timeUntilExecution);
                const commandQueueElement = document.getElementById('next-command');
                const timeElement = document.getElementById('time-until-next');

                commandQueueElement.textContent = nextCommand || "No upcoming commands";

                if (timeUntilExecution > 0) {
                    const hours = Math.floor(timeUntilExecution / 3600);
                    const minutes = Math.floor((timeUntilExecution % 3600) / 60);
                    const seconds = Math.floor((timeUntilExecution % 60));  // Ensure to floor the seconds

                    timeElement.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                } else {
                    timeElement.textContent = "00:00:00";  // Display zeros for immediate executions
                }
            }

            // Function to schedule commands, with logging
            function scheduleNextCommand(command, executionTimeInSeconds) {
                const now = Math.floor(new Date().getTime() / 1000);  // Current time in seconds

                // Skip scheduling if no valid command or if execution time is in the past
                if (!command || executionTimeInSeconds <= now) {
                    console.warn("Invalid command or execution time in the past. Skipping scheduling.");
                    return;
                }

                const timeUntilExecution = executionTimeInSeconds - now;
                console.log(`Scheduling next command: ${command} to execute in ${timeUntilExecution} seconds`);

                updateCommandQueue(command, timeUntilExecution);

                // Schedule the command using CommandScheduler
                window.CommandScheduler.scheduleNextCommand(command, executionTimeInSeconds);
            }

            // Initialize the command queue
            console.log("Before calling scheduleNextCommand"); // Log before the function call
            clearCommandQueue();  // Call clearCommandQueue to ensure it's clean
            console.log("After clearing command queue");

            // Example of scheduling (commented out to prevent unexpected behavior)
            // scheduleNextCommand("Turn on light", Math.floor(new Date().getTime() / 1000) + 10);

            console.log("After calling scheduleNextCommand"); // Log after the function call
        } else {
            console.error("CommandScheduler is not defined. Ensure CommandScheduler.js is loaded correctly.");
        }
    </script>

    <!-- Main Initialization Script -->
    <script>
        window.addEventListener('load', function() {
            console.log("All scripts loaded. Initializing event listeners...");

            const fetchLightsButton = document.getElementById("fetchLightsButton");
            if (fetchLightsButton) {
                fetchLightsButton.addEventListener("click", fetchLights);
                console.log("Event listener added to fetchLightsButton");
            } else {
                console.error("fetchLightsButton not found!");
            }

            const refreshLightStateButton = document.getElementById("refreshLightStateButton");
            if (refreshLightStateButton) {
                refreshLightStateButton.addEventListener("click", debounce(fetchLightState, 300));
                console.log("Event listener added to refreshLightStateButton");
            } else {
                console.error("refreshLightStateButton not found!");
            }

            const saveGraphBtn = document.getElementById("saveGraphBtn");
            if (saveGraphBtn) {
                saveGraphBtn.addEventListener("click", saveGraph);
                console.log("Event listener added to saveGraphBtn");
            } else {
                console.error("saveGraphBtn not found!");
            }

            const saveGraphAsBtn = document.getElementById("saveGraphAsBtn"); // New Button
            if (saveGraphAsBtn) {
                saveGraphAsBtn.addEventListener("click", saveGraphAs);
                console.log("Event listener added to saveGraphAsBtn");
            } else {
                console.error("saveGraphAsBtn not found!");
            }

            const loadGraphBtn = document.getElementById("loadGraphBtn");
            if (loadGraphBtn) {
                loadGraphBtn.addEventListener("click", () => document.getElementById('fileInput').click());
                console.log("Event listener added to loadGraphBtn");
            } else {
                console.error("loadGraphBtn not found!");
            }

            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', function(event) {
                    const file = event.target.files[0];
                    if (file) loadGraphFromFile(file);
                });
                console.log("Event listener added to fileInput");
            } else {
                console.error("fileInput not found!");
            }

            const fetchGlobalsButton = document.getElementById("fetchGlobalsButton");
            if (fetchGlobalsButton) {
                fetchGlobalsButton.addEventListener("click", fetchGlobals);
                console.log("Event listener added to fetchGlobalsButton");
            } else {
                console.error("fetchGlobalsButton not found!");
            }

            const showAllLogsButton = document.getElementById("showAllLogsButton");
            if (showAllLogsButton) {
                showAllLogsButton.addEventListener("click", function() {
                    const logPanel = document.getElementById("log-panel");
                    for (let log of logPanel.children) {
                        log.style.display = "block";
                    }
                    console.log("All logs are now visible.");
                });
                console.log("Event listener added to showAllLogsButton");
            } else {
                console.error("showAllLogsButton not found!");
            }
        });

        // Debouncing utility to prevent too many rapid calls
        function debounce(func, delay) {
            let debounceTimer;
            return function() {
                const context = this, args = arguments;
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => func.apply(context, args), delay);
            };
        }

        const bridgeIP = localStorage.getItem('bridgeIp') || '192.168.1.39';
        const apiKey = localStorage.getItem('apiKey') || 'GAlIQT79YdUS3pHqO2Plc61koIVy-D5CsG6nBZ2w';

        document.getElementById('bridgeIP').textContent = `Bridge IP: ${bridgeIP}`;
        document.getElementById('apiKey').textContent = `API Key: ${apiKey}`;

        async function fetchLights() {
            try {
                const response = await fetch(`http://${bridgeIP}/api/${apiKey}/lights`);
                const data = await response.json();
                populateLightDropdown(data);
                logEvent("Fetched lights successfully.");
            } catch (error) {
                console.error('Error fetching lights:', error);
                logEvent(`Error fetching lights: ${error}`, "error");
            }
        }

        function populateLightDropdown(data) {
            const lightDropdown = document.getElementById('lightDropdown');
            lightDropdown.innerHTML = '';
            for (const [id, light] of Object.entries(data)) {
                const option = document.createElement('option');
                option.value = id;
                option.text = light.name;
                lightDropdown.appendChild(option);
            }
            lightDropdown.addEventListener('change', fetchLightState);
            fetchLightState();
            logEvent("Populated light dropdown.");
        }

        async function fetchLightState() {
            const selectedLightId = document.getElementById('lightDropdown').value;
            try {
                const response = await fetch(`http://${bridgeIP}/api/${apiKey}/lights/${selectedLightId}`);
                const data = await response.json();
                const rgb = data.state.xy ? convertXYtoRGB(data.state.xy[0], data.state.xy[1], data.state.bri) : 'N/A';
                const brightness = data.state.bri;
                document.getElementById('lightRGB').textContent = `RGB: ${rgb.join(', ')}`;
                document.getElementById('lightBrightness').textContent = `Brightness: ${brightness}`;
                logEvent(`Fetched state for light ${selectedLightId}.`);
            } catch (error) {
                console.error('Error fetching light state:', error);
                logEvent(`Error fetching light state: ${error}`, "error");
            }
        }

        function convertXYtoRGB(x, y, brightness) {
            let z = 1.0 - x - y;
            let Y = brightness / 255.0;
            let X = (Y / y) * x;
            let Z = (Y / y) * z;

            let r = X * 1.656492 - Y * 0.354851 - Z * 0.255038;
            let g = -X * 0.707196 + Y * 1.655397 + Z * 0.036152;
            let b = X * 0.051713 - Y * 0.121364 + Z * 1.011530;

            const applyGamma = (color) => color <= 0.0031308 ? 12.92 * color : 1.055 * Math.pow(color, 1.0 / 2.4) - 0.055;
            r = applyGamma(r);
            g = applyGamma(g);
            b = applyGamma(b);

            r = Math.round(Math.max(0, Math.min(1, r)) * 255);
            g = Math.round(Math.max(0, Math.min(1, g)) * 255);
            b = Math.round(Math.max(0, Math.min(1, b)) * 255);

            return [r, g, b];
        }

        function saveGraph() {
            try {
                const graphData = JSON.stringify(graph.serialize());
                const blob = new Blob([graphData], { type: 'application/json' });
                const defaultFilename = `graph_${new Date().toISOString().replace(/[:.]/g, '-')}.json`;

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = defaultFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                logEvent("Graph saved successfully.");
            } catch (error) {
                console.error("Error saving graph:", error);
                logEvent(`Error saving graph: ${error}`, "error");
            }
        }

        function saveGraphAs() { // New Function
            try {
                // Prompt the user for a filename
                let filename = prompt("Enter filename for the graph:", `graph_${new Date().toISOString().replace(/[:.]/g, '-')}.json`);

                // If the user cancels the prompt or enters an empty filename, abort the save operation
                if (filename === null) {
                    console.log("Save Graph As operation canceled by the user.");
                    return;
                }
                filename = filename.trim();
                if (filename === "") {
                    alert("Filename cannot be empty. Please try again.");
                    return;
                }

                // Ensure the filename ends with .json
                if (!filename.toLowerCase().endsWith('.json')) {
                    filename += '.json';
                }

                const graphData = JSON.stringify(graph.serialize(), null, 2); // Pretty-print JSON for readability
                const blob = new Blob([graphData], { type: 'application/json' });

                // Create a temporary <a> element to trigger the download
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                logEvent(`Graph saved successfully as ${filename}.`);
            } catch (error) {
                console.error("Error in Save Graph As:", error);
                logEvent(`Error in Save Graph As: ${error}`, "error");
            }
        }

        function loadGraphFromFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const graphData = e.target.result;
                try {
                    graph.clear();
                    graph.configure(JSON.parse(graphData));
                    console.log("Graph loaded successfully from file");
                    logEvent("Graph loaded successfully from file.");
                } catch (err) {
                    console.error("Error loading graph from file:", err);
                    logEvent(`Error loading graph from file: ${err}`, "error");
                }
            };
            reader.readAsText(file);
        }

        function logEvent(message, type = "general") {
            const logPanel = document.getElementById("log-panel");
            const logEntry = document.createElement("div");
            logEntry.textContent = message;

            if (type === "error") {
                logEntry.style.color = "red";
            } else if (type === "warning") {
                logEntry.style.color = "yellow";
            } else {
                logEntry.style.color = "white";
            }

            if (logPanel.children.length > 100) {
                logPanel.removeChild(logPanel.firstChild);
            }

            logPanel.appendChild(logEntry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        function fetchGlobals() {
            console.log("Fetch Globals button clicked.");
            logEvent("Fetch Globals button clicked.");
        }
    </script>
